# Build gochu-ibus and create a GitHub Release when a version tag is pushed.
# Pattern follows established Rust projects like ripgrep: trigger on tags,
# build on CI, and use the GitHub CLI to create/upload release assets.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Show version
        run: echo "version is: $VERSION"

      - name: Create GitHub release (if missing)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release if it does not exist yet; otherwise this is a no-op.
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"
          fi

  build-linux-x64:
    name: Build Linux x86_64 binary
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build gochu-ibus
        run: cargo build --release -p gochu-ibus

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp target/release/gochu-ibus gochu-ibus-linux-x86_64
          gh release upload "$VERSION" gochu-ibus-linux-x86_64 --clobber
